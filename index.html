<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Night Room</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="not-found">
  <h1>404</h1>
  <h3>Not Found</h3>
  <p>the resource requested could not be found on this server</p>
</div>

<main id="content">
  <canvas id="stars"></canvas>
  <img id="moon" src="./images/moon.webp" alt="">
  <img id="earth" src="./images/earth.webp" alt="">
  <img id="mars" src="./images/mars.webp" alt="">

  <section id="interface">
  <div id="input-field">
  <div class="input-wrap" id="wrap-name">
    <div class="scan-bar"></div>
    <div class="bracket tl"></div><div class="bracket tr"></div>
    <div class="bracket bl"></div><div class="bracket br"></div>
    <input class="c-trans" id="enter-name" name="enter-name" type="text" placeholder="Name">
  </div>

  <div class="input-wrap" id="wrap-message">
    <div class="scan-bar"></div>
    <div class="bracket tl"></div><div class="bracket tr"></div>
    <div class="bracket bl"></div><div class="bracket br"></div>
    <input class="c-trans" id="message" name="send-message" type="text" placeholder="enter message here">
  </div>

  <button class="c-trans" id="send">Send</button>
</div>

  <div id="header">
    <p id="header-title">The Night Room</p>
    <p id="time"></p>  
  </div>
  </section>

</main>

<script src="./script.js"></script>
</body>
</html>
